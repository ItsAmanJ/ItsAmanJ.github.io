<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman | Portfolio</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
        }
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #94a3b8; margin-bottom: 30px; text-align: center; font-size: 0.9rem; max-width: 300px; }
        
        .links-container { width: 100%; max-width: 400px; }
        
        .link-card {
            background: var(--card-bg);
            display: block;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            transition: transform 0.2s, border 0.2s;
            border: 1px solid transparent;
        }
        .link-card:hover {
            transform: scale(1.03);
            border-color: var(--accent);
        }
        .link-card strong { display: block; font-size: 1.1rem; }
        .link-card span { font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

    <img src="https://via.placeholder.com/150" alt="Aman" class="profile-pic">

    <h1>Aman</h1>
    <p>JEE Aspirant | Android & Linux Enthusiast | Tech Explorer</p>

    <div class="links-container">
        <a href="https://github.com/yourusername?tab=repositories" class="link-card">
            <strong>My Projects</strong>
            <span>Termux setups, Linux scripts, and tech experiments</span>
        </a>

        <a href="#" class="link-card">
            <strong>JEE Prep Resources</strong>
            <span>Physics, Chemistry, and Math notes</span>
        </a>

        <a href="#" class="link-card">
            <strong>Gaming Profiles</strong>
            <span>Stats for PUBG and Clash Royale</span>
        </a>

        <a href="mailto:your-email@gmail.com" class="link-card">
            <strong>Get in Touch</strong>
            <span>Email me for collaborations or tech talk</span>
        </a>
    </div>

</body>
</html>
